{% extends 'base.html' %}
{% block content %}
    <article class="glass-card mb-4 p-5 shadow-lg mt-4">
        <div class="d-flex justify-content-between align-items-start mb-4">
            <h1 class="post-title gradient-text h2 mb-0 fw-bold">{{ post.title }}</h1>
            {% if post.author == current_user %}
                <div class="dropdown">
                    <button class="btn btn-sm-glass dropdown-toggle" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
                        Actions
                    </button>
                    <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="dropdownMenuButton">
                        <li><a class="dropdown-item text-info" href="{{ url_for('update_post', post_id=post.id) }}">Edit Post</a></li>
                        <li>
                            <form action="{{ url_for('delete_post', post_id=post.id) }}" method="POST" class="m-0 p-0">
                                <button class="dropdown-item text-danger w-100 text-start" type="submit" onclick="return confirm('Are you sure you want to delete this post?');">Delete Post</button>
                            </form>
                        </li>
                    </ul>
                </div>
            {% endif %}
        </div>
        
        <div class="post-meta mb-4 pb-3 border-bottom d-flex align-items-center">
            <img class="rounded-circle me-3 border" src="https://ui-avatars.com/api/?name={{ post.author.username }}&background=random&size=48" alt="{{ post.author.username }}">
            <div>
                <p class="mb-0 fw-medium text-light fs-5">{{ post.author.username }}</p>
                <small class="text-muted">{{ post.date_posted.strftime('%B %d, %Y') }} at {{ post.date_posted.strftime('%H:%M') }}</small>
            </div>
        </div>
        
        <div class="article-content text-light fs-5" style="white-space: pre-wrap; opacity: 0.95; line-height: 1.7;">{{ post.content }}</div>
        
        <div class="mt-5 pt-4 border-top">
            <a href="{{ url_for('home') }}" class="btn btn-sm-glass px-4 py-2 rounded-pill">&larr; Back to Home</a>
        </div>
    </article>
{% endblock %}
